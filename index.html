<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Scanner Counter</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0a; --border: #222; --accent: #e8ff47; --text: #f0f0f0; --muted: #555; }
    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; }
    body { display: grid; grid-template-rows: auto 1fr auto; min-height: 100vh; }
    header { padding: 2rem 2rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.15em; color: var(--accent); }
    .status-dot { display: flex; align-items: center; gap: 0.5rem; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
    main { display: grid; grid-template-columns: 1fr 1fr; max-width: 900px; margin: 0 auto; width: 100%; padding: 3rem 2rem; align-items: center; }
    .qr-section { display: flex; flex-direction: column; align-items: flex-start; gap: 1.5rem; padding-right: 3rem; border-right: 1px solid var(--border); }
    .section-label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .qr-wrapper { position: relative; background: #fff; padding: 16px; border-radius: 4px; display: inline-block; }
    .qr-wrapper canvas { display: block; }
    .qr-corner { position: absolute; width: 16px; height: 16px; border-color: var(--accent); border-style: solid; }
    .qr-corner.tl { top:-4px; left:-4px; border-width:2px 0 0 2px; }
    .qr-corner.tr { top:-4px; right:-4px; border-width:2px 2px 0 0; }
    .qr-corner.bl { bottom:-4px; left:-4px; border-width:0 0 2px 2px; }
    .qr-corner.br { bottom:-4px; right:-4px; border-width:0 2px 2px 0; }
    .qr-url { font-size: 0.7rem; color: var(--muted); word-break: break-all; max-width: 240px; }
    .qr-url span { color: var(--accent); }
    .counter-section { display: flex; flex-direction: column; align-items: flex-end; gap: 1rem; padding-left: 3rem; }
    .counter-display { font-family: 'Bebas Neue', sans-serif; font-size: clamp(5rem,12vw,9rem); line-height: 0.9; color: var(--text); letter-spacing: -0.02em; text-align: right; transition: color 0.3s ease; }
    .counter-display.bump { color: var(--accent); }
    .counter-label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .counter-sub { display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem; }
    .refresh-bar { width: 120px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .refresh-fill { height: 100%; background: var(--accent); animation: refill 3s linear infinite; }
    @keyframes refill { 0%{width:100%} 100%{width:0%} }
    .refresh-text { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; }
    footer { padding: 1rem 2rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.08em; }
    .scan-flash { position: fixed; inset: 0; background: var(--accent); opacity: 0; pointer-events: none; z-index: 500; transition: opacity 0.1s; }
    @media (max-width: 600px) {
      main { grid-template-columns: 1fr; gap: 2.5rem; padding: 2rem 1.5rem; }
      .qr-section { border-right: none; border-bottom: 1px solid var(--border); padding-right: 0; padding-bottom: 2.5rem; align-items: center; }
      .counter-section { padding-left: 0; align-items: center; }
      .counter-display, .counter-label, .counter-sub { text-align: center; align-items: center; }
    }
  </style>
</head>
<body>
<div class="scan-flash" id="flash"></div>
<header>
  <div class="logo">QR · COUNTER</div>
  <div class="status-dot"><div class="dot"></div><span>LIVE</span></div>
</header>
<main>
  <section class="qr-section">
    <div class="section-label">// Scannez pour visiter</div>
    <div class="qr-wrapper">
      <canvas id="qrCanvas"></canvas>
      <div class="qr-corner tl"></div><div class="qr-corner tr"></div>
      <div class="qr-corner bl"></div><div class="qr-corner br"></div>
    </div>
    <div class="qr-url" id="qrUrl"></div>
  </section>
  <section class="counter-section">
    <div class="section-label">// Scans totaux</div>
    <div class="counter-display" id="counterDisplay">—</div>
    <div class="counter-label">SCANS</div>
    <div class="counter-sub">
      <div class="refresh-bar"><div class="refresh-fill"></div></div>
      <div class="refresh-text">↻ mise à jour toutes les 3s</div>
    </div>
  </section>
</main>
<footer>
  <span>SERRURE METAL ART</span>
  <span>COMPTEUR DE SCANS · <span id="lastUpdate">—</span></span>
</footer>

<script>
  const SUPABASE_URL      = "https://eohkivnlutebhgdgiexr.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvaGtpdm5sdXRlYmhnZGdpZXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTY2NzQsImV4cCI6MjA5MTg5MjY3NH0.Ut14GDFAmTdt5jLuI4gRqKErA8ScLtL8Qyo6BWGA7Zo";

  const SCAN_URL     = "https://serrure-metal-art.github.io/qr-counter/?scan=1";
  const REDIRECT_URL = "https://www.serrure-metal-art.fr/";

  let lastCount = null;

  async function handleScan() {
    window.location.replace(REDIRECT_URL);
    navigator.sendBeacon(
      `${SUPABASE_URL}/rest/v1/rpc/increment_counter?apikey=${SUPABASE_ANON_KEY}`,
      new Blob(['{}'], { type: 'application/json' })
    );
  }

  async function fetchCount() {
    try {
      const res  = await fetch(
        `${SUPABASE_URL}/rest/v1/counter?id=eq.1&select=value`,
        { headers: { apikey: SUPABASE_ANON_KEY, Authorization: 'Bearer ' + SUPABASE_ANON_KEY } }
      );
      const data = await res.json();
      const val  = data[0].value;
      const display = document.getElementById('counterDisplay');
      if (lastCount !== null && val > lastCount) {
        const flash = document.getElementById('flash');
        flash.style.opacity = '0.08';
        setTimeout(() => flash.style.opacity = '0', 200);
        display.classList.add('bump');
        setTimeout(() => display.classList.remove('bump'), 600);
      }
      lastCount = val;
      display.textContent = val.toLocaleString('fr-FR');
      document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('fr-FR');
    } catch (e) {
      document.getElementById('counterDisplay').textContent = 'ERR';
    }
  }

  const isScan = new URLSearchParams(window.location.search).has('scan');

  if (isScan) {
    handleScan();
  } else {
    QRCode.toCanvas(document.getElementById('qrCanvas'), SCAN_URL, {
      width: 200, margin: 0,
      color: { dark: '#0a0a0a', light: '#ffffff' }
    });
    document.getElementById('qrUrl').innerHTML =
      'Pointe vers : <span>' + SCAN_URL + '</span>';
    fetchCount();
    setInterval(fetchCount, 3000);
  }
</script>
</body>
</html>
